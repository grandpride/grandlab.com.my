<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--card:#151515;--card2:#1c1c1a;--gold:#F5C518;--text:#f4f4f0;--muted:#9a9a92;--line:#2a2a26;--green:#16A34A;--red:#e0533d}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;padding-bottom:80px}
  .top{background:linear-gradient(180deg,#111,#0a0a0a);border-bottom:1px solid var(--line);padding:16px;text-align:center;position:sticky;top:0;z-index:10}
  .logo{font-weight:900;font-size:20px;letter-spacing:1px}.logo span{color:var(--gold)}
  .top .sub{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:12px;overflow:hidden}
.sechead{width:100%;background:none;border:0;color:var(--text);font-size:15px;font-weight:700;text-align:left;padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:inherit}
.sechead:hover{background:var(--card2)}
.sechead i{color:var(--gold);font-size:18px;flex:none}
.secbody{padding:0 18px 18px}
.tabbar{position:sticky;top:0;z-index:20;display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch}
.tabbar::-webkit-scrollbar{display:none}
.tabbtn{flex:none;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.tabbtn.on{background:var(--gold);border-color:var(--gold);color:#111}
  .sec h2{font-size:14px;color:var(--gold);margin-bottom:14px;letter-spacing:.03em}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:11px 0 5px}
  input,textarea{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:#fff;padding:11px 12px;font-size:14px;font-family:inherit;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--gold)}
  select{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:#fff;padding:11px 12px;font-size:14px;font-family:inherit;outline:none}
  .hint2{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
  .upbtn{margin-top:8px;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .upbtn:hover{border-color:var(--gold)}
  .vidprev{margin-top:10px;width:100%;border-radius:9px;border:1px solid var(--line);max-height:180px;object-fit:cover}
  .ggrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
  .gthumb{position:relative;aspect-ratio:1}
  .gthumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
  .gthumb button{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;line-height:1}
  textarea{resize:vertical;min-height:70px;line-height:1.5}
  .imgprev{margin-top:8px;aspect-ratio:16/8;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#000}
  .imgprev img{width:100%;height:100%;object-fit:cover}
  .savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);border-top:1px solid var(--line);padding:14px 16px;backdrop-filter:blur(8px);z-index:20}
  .savebar .inner{max-width:680px;margin:0 auto;display:flex;gap:12px;align-items:center}
  .btn{background:var(--gold);color:#080808;border:none;border-radius:11px;padding:14px;font-weight:800;font-size:15px;font-family:inherit;cursor:pointer;flex:1}
  .btn:disabled{opacity:.6}
  .btn.sec2{background:var(--card2);color:var(--text);border:1px solid var(--line);flex:0 0 auto;padding:14px 18px}
  .msg{font-size:13px;min-width:0}
  .msg.ok{color:#3ec76e}.msg.err{color:var(--red)}
  /* gate */
  #gate{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  #gate .box{max-width:340px;width:100%}
  #gate .err{color:var(--red);font-size:12px;margin:8px 0;min-height:15px}
  a.back{position:fixed;top:8px;left:8px;z-index:110;background:rgba(0,0,0,.6);color:var(--gold);text-decoration:none;font-size:12px;font-weight:700;padding:6px 11px;border-radius:20px}
</style>
</head>

<a class="back" href="https://grandpride.github.io/Grandlab-app/gl-hub.html">← Hub</a>

<div id="gate">
  <div class="box">
    <div class="logo" style="text-align:center;margin-bottom:4px">GRAND<span>LAB</span></div>
    <div class="sub" style="text-align:center;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px">Website Editor</div>
    <label>Email</label><input id="loginEmail" type="email" autocomplete="username" placeholder="admin@grandpride.com">
    <label>Password</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="loginErr"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="top">
    <div class="logo">GRAND<span>LAB</span></div>
    <div class="sub">Website Editor</div>
  </div>
  <div class="tabbar" id="tabbar"><!-- built by JS --></div>
  <div class="wrap" id="forms"><!-- built by JS --></div>
</div>

<div class="savebar" id="savebar" style="display:none">
  <div class="inner">
    <button class="btn sec2" onclick="window.open('/','_blank')"><i class="ti ti-external-link"></i></button>
    <div class="msg" id="msg"></div>
    <button class="btn" id="saveBtn" onclick="saveAll()"><i class="ti ti-device-floppy"></i> Save Changes</button>
  </div>
</div>

   ['ct_logo_facebook','Facebook logo','img'],
   ['ct_logo_instagram','Instagram logo','img'],
   ['ct_logo_tiktok','TikTok logo','img'],
   ['ct_logo_maps','Google Maps logo','img'],
   ['ct_logo_waze','Waze logo','img'],
 ]},
];

let DATA={};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function boot(){
  const {data}=await sb.auth.getSession();
  if(data&&data.session) showApp(); else $('gate').style.display='flex';
}
async function doLogin(){
  const email=$('loginEmail').value.trim(), pass=$('loginPass').value;
  $('loginErr').textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ $('loginErr').textContent='Login failed: '+error.message; return; }
  showApp();
}
async function showApp(){
  $('gate').style.display='none'; $('app').style.display='block'; $('savebar').style.display='block';
  const {data}=await sb.from('gl_site_content').select('key,value');
  (data||[]).forEach(r=>DATA[r.key]=r.value);
  render();
}
let ACTIVE_TAB = localStorage.getItem('gl_admin_tab') || 'Home';
if(TABS.indexOf(ACTIVE_TAB)===-1) ACTIVE_TAB='Home';
const OPEN={};
function setTab(t){ syncDom(); ACTIVE_TAB=t; try{localStorage.setItem('gl_admin_tab',t);}catch(e){} render(); window.scrollTo(0,0); }
function toggleSec(id){ syncDom(); OPEN[id]=!OPEN[id]; render(); }
function render(){
  $('tabbar').innerHTML=TABS.map(t=>
    `<button type="button" class="tabbtn${t===ACTIVE_TAB?' on':''}" onclick="setTab('${t}')">${esc(t)}</button>`
  ).join('');
  $('forms').innerHTML=SCHEMA.filter(sec=>sec.t===ACTIVE_TAB).map((sec,si)=>{
    const secId=ACTIVE_TAB+'_'+si;
    if(!(secId in OPEN)) OPEN[secId] = !!sec.open;
    const fields=sec.f.map(([key,label,type])=>{
      const v=DATA[key]||'';
      if(type==='area') return `<label>${esc(label)}</label><textarea data-k="${key}" oninput="onEdit()">${esc(v)}</textarea>`;
      if(type==='img') return `<label>${esc(label)}</label><input data-k="${key}" value="${esc(v)}" oninput="onEdit();previewImg('${key}')" placeholder="photo URL (or upload below)">
        <button type="button" class="upbtn" onclick="imgPick('${key}')"><i class="ti ti-upload"></i> Upload photo</button>
        ${SIZEHINT[key]?`<div class="hint2"><i class="ti ti-photo"></i> ${SIZEHINT[key]}</div>`:''}
        <div class="hint2" id="imgstat_${key}"></div>
        <div class="imgprev"><img id="prev_${key}" src="${esc(v)}" onerror="this.style.opacity=.2"></div>`;
      if(type==='fontpick'){
        const fonts=['Iceland','Work Sans'];
        return `<label>${esc(label)}</label>
          <select data-k="${key}" oninput="onEdit();fontPreview()">${fonts.map(f=>`<option value="${esc(f)}"${v===f?' selected':''} style="font-family:'${esc(f)}'">${esc(f)}</option>`).join('')}</select>`;
      }
      if(type==='pxH'||type==='pxB'){
        const def=type==='pxH'?'48':'16';
        return `<label>${esc(label)}</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="number" min="8" max="120" value="${esc(v||def)}" data-k="${key}" oninput="onEdit()" style="width:110px">
            <span style="color:var(--muted);font-size:13px">px</span>
          </div>
          <div class="hint2">${type==='pxH'?'Desktop heading size. Scales down on smaller screens.':'Body text size. 16px is standard.'}</div>`;
      }
      if(type==='mediatype') return `<label>${esc(label)}</label>
        <select data-k="${key}" oninput="onEdit()">
          <option value="image"${v==='image'?' selected':''}>Photo</option>
          <option value="video"${v==='video'?' selected':''}>Video (loop)</option>
        </select>
        <div class="hint2">Choose whether the top banner shows a photo or a looping video.</div>`;
      if(type==='gallery'){
        const urls=(v||'').split('|').map(x=>x.trim()).filter(Boolean);
        const thumbs=urls.map((u,i)=>`<div class="gthumb"><img src="${esc(u)}"><button type="button" onclick="galRemove('${key}',${i})">&times;</button></div>`).join('');
        return `<label>${esc(label)}</label>
          <input type="hidden" data-k="${key}" value="${esc(v||'')}">
          <div class="ggrid" id="gal_${key}">${thumbs}</div>
          <button type="button" class="upbtn" onclick="galPick('${key}')"><i class="ti ti-photo-plus"></i> Add photos</button>
          <div class="hint2"><i class="ti ti-photo"></i> ${SIZEHINT[key]||'1600 px wide, JPG, under 1 MB each.'} Add several &mdash; they display in the order shown.</div>
          <div id="galstat_${key}" class="hint2"></div>`;
      }
      if(type==='video') return `<label>${esc(label)}</label>
        <input data-k="${key}" value="${esc(v)}" oninput="onEdit()" placeholder="video URL (or upload below)">
        <button type="button" class="upbtn" onclick="document.getElementById('vidfile_${key}').click()"><i class="ti ti-upload"></i> Upload MP4</button>
        <input id="vidfile_${key}" type="file" accept="video/mp4" style="display:none" onchange="uploadVideo(this.files[0],'${key}')">
        <div class="hint2"><i class="ti ti-video"></i> ${SIZEHINT[key]||'1920 &times; 1080 px, MP4, <b>max 8 MB</b>, 10&ndash;20 sec.'} Larger files load slowly.</div>
        <div id="vidstat_${key}" class="hint2"></div>
        ${v?`<video src="${esc(v)}" class="vidprev" muted autoplay loop playsinline></video>`:''}`;
      return `<label>${esc(label)}</label><input data-k="${key}" value="${esc(v)}" oninput="onEdit()">`;
    }).join('');
    const isOpen=OPEN[secId];
    return `<div class="sec">
      <button type="button" class="sechead" onclick="toggleSec('${secId}')">
        <span>${esc(sec.h)}</span>
        <i class="ti ti-chevron-${isOpen?'up':'down'}"></i>
      </button>
      <div class="secbody" style="display:${isOpen?'block':'none'}">${fields}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.sec .ggrid').forEach(g=>{
    const k=g.id.replace('gal_',''); if(k) galRender(k);
  });
}
function previewImg(k){ const el=$('prev_'+k); if(el){ el.style.opacity=1; el.src=document.querySelector('[data-k="'+k+'"]').value; } }
let dirty=false;
function syncDom(){ document.querySelectorAll('[data-k]').forEach(el=>{ DATA[el.dataset.k]=el.value; }); }
function onEdit(){ syncDom(); dirty=true; $('msg').textContent='Unsaved changes'; $('msg').className='msg'; }

async function uploadVideo(file,key){
  if(!file) return;
  const st=document.getElementById('vidstat_'+key)||document.getElementById('vidstat');
  if(file.size>8*1024*1024){ st.innerHTML='<span style="color:#e0533d">That file is '+(file.size/1048576).toFixed(1)+' MB — please keep under 8 MB.</span>'; }
  st.textContent='Uploading… ('+(file.size/1048576).toFixed(1)+' MB)';
  try{
    const path=key.replace(/[^a-z0-9_]/gi,'')+'-'+Date.now()+'.mp4';
    const r=await fetch(SUPABASE_URL+'/storage/v1/object/gl-videos/'+path,{
      method:'POST',headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON},body:file});
    if(r.ok){
      const url=SUPABASE_URL+'/storage/v1/object/public/gl-videos/'+path;
      const inp=document.querySelector('[data-k="'+key+'"]'); inp.value=url; onEdit();
      st.innerHTML='<span style="color:#3ec76e">✓ Uploaded. Remember to Save.</span>';
    } else { st.innerHTML='<span style="color:#e0533d">Upload failed — check the gl-videos bucket exists and is public.</span>'; }
  }catch(e){ st.innerHTML='<span style="color:#e0533d">Error: '+e.message+'</span>'; }
}

// ---- single photo upload (img fields) ----
function imgPick(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ if(inp.files&&inp.files[0]) await imgUpload(key,inp.files[0]); }; inp.click();
}
async function imgUpload(key,file){
  const st=document.getElementById('imgstat_'+key);
  st.textContent='Uploading…';
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path='site-'+Date.now()+'-'+Math.random().toString(36).slice(2,6)+'.'+ext;
    const r=await fetch(SUPABASE_URL+'/storage/v1/object/gl-images/'+path,
      {method:'POST',headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON},body:file});
    if(r.ok){
      const url=SUPABASE_URL+'/storage/v1/object/public/gl-images/'+path;
      const inp=document.querySelector('input[data-k="'+key+'"]');
      inp.value=url; previewImg(key); onEdit();
      st.innerHTML='<span style="color:#3ec76e">\u2713 Uploaded. Remember to Save.</span>';
    } else {
      st.innerHTML='<span style="color:#e0533d">Upload failed — check the gl-images bucket is public.</span>';
    }
  }catch(e){ st.innerHTML='<span style="color:#e0533d">Error: '+e.message+'</span>'; }
}

// ---- gallery (multi-photo) helpers ----
function galInput(key){ return document.querySelector('input[data-k="'+key+'"]'); }
function galUrls(key){ const v=galInput(key).value; return v?v.split('|').map(x=>x.trim()).filter(Boolean):[]; }
function galRender(key){
  const urls=galUrls(key);
  document.getElementById('gal_'+key).innerHTML=urls.map((u,i)=>'<div class="gthumb"><img src="'+u+'"><button type="button" onclick="galRemove(\''+key+'\','+i+')">&times;</button></div>').join('');
}
function galRemove(key,i){ const u=galUrls(key); u.splice(i,1); galInput(key).value=u.join('|'); galRender(key); onEdit(); }
function galPick(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.onchange=async()=>{ await galUpload(key,inp.files); }; inp.click();
}
async function galUpload(key,files){
  const st=document.getElementById('galstat_'+key); st.textContent='Uploading '+files.length+' photo(s)…';
  let cur=galUrls(key), done=0;
  for(const f of files){
    try{
      const path='site-'+Date.now()+'-'+Math.random().toString(36).slice(2,6)+'.'+((f.name.split('.').pop()||'jpg').toLowerCase());
      const r=await fetch(SUPABASE_URL+'/storage/v1/object/gl-images/'+path,{method:'POST',headers:{apikey:SUPABASE_ANON,Authorization:'Bearer '+SUPABASE_ANON},body:f});
      if(r.ok){ cur.push(SUPABASE_URL+'/storage/v1/object/public/gl-images/'+path); done++; galInput(key).value=cur.join('|'); galRender(key); }
    }catch(e){}
  }
  onEdit(); st.innerHTML='<span style="color:#3ec76e">✓ Added '+done+' photo(s). Remember to Save.</span>';
}

// load all curated google fonts for admin preview
(function(){
  const fams=['Iceland','Work Sans'];
  const l=document.createElement('link'); l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?'+fams.map(f=>'family='+f.replace(/ /g,'+')+':wght@400;600;700').join('&')+'&display=swap';
  document.head.appendChild(l);
})();
function fontPreview(){/* dropdown option font-family already previews */}

async function saveAll(){
  $('saveBtn').disabled=true; $('msg').textContent='Saving…'; $('msg').className='msg';
  syncDom();
  const ALLKEYS=[]; SCHEMA.forEach(sec=>sec.f.forEach(fd=>ALLKEYS.push(fd[0])));
  const now=new Date().toISOString();
  const rows=ALLKEYS.filter(k=>DATA[k]!==undefined)
                    .map(k=>({key:k, value:DATA[k]===null?'':String(DATA[k]), updated_at:now}));
  const {error}=await sb.from('gl_site_content').upsert(rows);
  $('saveBtn').disabled=false;
  if(error){ $('msg').textContent='Failed: '+error.message; $('msg').className='msg err'; return; }
  dirty=false; $('msg').textContent='✓ Saved — refresh the website to see changes'; $('msg').className='msg ok';
}
addEventListener('beforeunload',e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });
boot();
</script>
</body>
